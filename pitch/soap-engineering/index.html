<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sentinel OT. Partner Briefing.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #141821;
      --navy-light: #1a1f2e;
      --navy-mid: #242a3a;
      --accent: #0ea5e9;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body { width: 100%; font-family: var(--font); -webkit-font-smoothing: antialiased; }

    /* ACCESS GATE */
    body.is-locked {
      height: 100%;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.is-locked main { display: none; }

    .access-gate {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 48px 40px; width: 100%; max-width: 420px;
    }
    .access-gate__logo { max-width: 220px; height: auto; margin-bottom: 36px; }
    .access-gate__label {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: #4a5570; margin-bottom: 8px;
    }
    .access-gate__heading { font-size: 1.1rem; font-weight: 500; color: #94a3b8; margin-bottom: 28px; }
    .access-gate__inputs { display: flex; gap: 10px; margin-bottom: 20px; }
    .access-gate__digit {
      width: 48px; height: 56px; text-align: center;
      font-size: 1.5rem; font-weight: 600; font-family: var(--font);
      background: var(--navy-light); border: 1px solid #2a3050;
      border-radius: 8px; color: #ffffff; outline: none;
      transition: border-color 0.15s; -moz-appearance: textfield;
    }
    .access-gate__digit::-webkit-outer-spin-button,
    .access-gate__digit::-webkit-inner-spin-button { -webkit-appearance: none; }
    .access-gate__digit:focus { border-color: var(--accent); background: #1a2840; }
    .access-gate__btn {
      width: 100%; padding: 14px; background: var(--accent);
      border: none; border-radius: 8px; color: #ffffff;
      font-size: 1rem; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: background 0.15s, opacity 0.15s; letter-spacing: 0.02em;
    }
    .access-gate__btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .access-gate__btn:not(:disabled):hover { background: #38bdf8; }
    .access-gate__error { margin-top: 12px; font-size: 0.85rem; color: #e84060; min-height: 1.2em; }

    /* SLIDE DECK (unlocked) */
    body:not(.is-locked) { height: 100%; overflow: hidden; background: #0a0e1a; }
    body:not(.is-locked) main { display: block; width: 100%; height: 100vh; }

    /* SLIDE STYLES */
    .deck { width: 100vw; height: 100vh; position: relative; }
    .slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column; justify-content: center;
      align-items: flex-start; padding: 64px 80px;
      background: #0a0e1a; font-family: var(--font); color: #e8eaf0;
    }
    .slide.active { display: flex; }
    h2 { font-size: 2.2rem; font-weight: 600; line-height: 1.2; color: #ffffff; }
    h3 { font-size: 1.4rem; font-weight: 600; color: #c0c8e0; }
    p  { font-size: 1.15rem; line-height: 1.6; color: #b0bcd0; }
    .act-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: #4a5570; margin-bottom: 20px;
    }
    .content { max-width: 900px; width: 100%; }
    .spacer { height: 24px; }
    .spacer-sm { height: 12px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #4a5570; padding: 8px 16px 8px 0; border-bottom: 1px solid #1e2540; }
    td { font-size: 1rem; padding: 10px 16px 10px 0; border-bottom: 1px solid #141828; color: #c0cce0; vertical-align: top; }
    td:first-child { color: #e0e8f8; font-weight: 500; }
    .cve-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 24px; }
    .cve-card { background: #111628; border: 1px solid #1e2540; border-left: 4px solid #e84060; border-radius: 6px; padding: 18px; }
    .cve-id { font-size: 0.85rem; font-weight: 700; color: #e84060; font-family: monospace; }
    .cve-cvss { font-size: 1.4rem; font-weight: 700; color: #ffffff; margin: 6px 0; }
    .cve-desc { font-size: 0.9rem; color: #8090b0; line-height: 1.4; }
    .cve-kev { font-size: 0.75rem; color: #00c896; font-weight: 600; margin-top: 8px; }
    .stats { display: flex; gap: 32px; margin-top: 28px; }
    .stat-number { font-size: 2.8rem; font-weight: 700; color: #e84060; line-height: 1; }
    .stat-label { font-size: 0.85rem; color: #4a5570; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 28px; width: 100%; max-width: 900px; }
    .col-block { background: #111628; border: 1px solid #1e2540; border-radius: 8px; padding: 24px; }
    .col-block h3 { color: #4a90d9; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .col-block ul { list-style: none; }
    .col-block ul li { font-size: 0.95rem; color: #b0bcd0; padding: 5px 0; border-bottom: 1px solid #1a2030; }
    .col-block ul li:last-child { border-bottom: none; }
    .bullet-list { list-style: none; margin-top: 20px; }
    .bullet-list li { font-size: 1.05rem; color: #b0bcd0; padding: 10px 0; border-bottom: 1px solid #141828; display: flex; align-items: flex-start; gap: 12px; }
    .bullet-list li::before { content: "2"; color: #e84060; font-size: 1.2rem; flex-shrink: 0; margin-top: -1px; }
    .bullet-list li:last-child { border-bottom: none; }
    .cost-table { width: 100%; max-width: 700px; margin-top: 24px; border-collapse: collapse; }
    .cost-table tr td { padding: 10px 0; border-bottom: 1px solid #141828; font-size: 1rem; color: #b0bcd0; }
    .cost-table tr td:last-child { text-align: right; color: #e0e8f8; font-weight: 500; }
    .cost-table tr.total td { color: #ffffff; font-size: 1.15rem; font-weight: 700; border-top: 2px solid #1e2540; border-bottom: none; }
    .cost-table tr.total td:last-child { color: #00c896; }
    .big-question { font-size: 2.8rem; font-weight: 700; color: #ffffff; line-height: 1.3; max-width: 700px; }
    .big-question-sub { font-size: 1.2rem; color: #7a8aaa; margin-top: 20px; max-width: 600px; line-height: 1.6; }
    .stack-list { margin-top: 20px; }
    .stack-item { display: flex; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid #141828; }
    .stack-item:last-child { border-bottom: none; }
    .stack-name { font-size: 1rem; font-weight: 600; color: #e0e8f8; min-width: 280px; }
    .stack-role { font-size: 0.9rem; color: #6a7a9a; }
    .stack-badge { margin-left: auto; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; background: #0d2a1a; color: #00c896; border: 1px solid #00c896; border-radius: 4px; padding: 3px 8px; }
    .divider { width: 60px; height: 3px; background: #e84060; margin: 20px 0; }
    .slide-nav { position: fixed; bottom: 24px; right: 32px; display: flex; align-items: center; gap: 16px; z-index: 100; }
    .nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #2a3050; background: #111628; color: #6a7a9a; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .nav-btn:hover { background: #1e2a48; color: #ffffff; border-color: #4a5a80; }
    .slide-counter { font-size: 0.8rem; color: #3a4560; font-family: monospace; }
    .logo { max-width: 200px; margin-bottom: 28px; }
    .cover-title { font-size: 3.5rem; font-weight: 800; color: #ffffff; line-height: 1.05; }
    .cover-sub { font-size: 1.4rem; color: #4a5570; margin-top: 16px; }
    .callout { background: #0d1f38; border: 1px solid #1a3060; border-left: 4px solid #4a90d9; border-radius: 6px; padding: 16px 20px; margin-top: 20px; max-width: 700px; }
    .callout p { font-size: 0.95rem; color: #8090b0; margin: 0; }
    .callout strong { color: #c0d0f0; }
  </style>
</head>

    <img src="../../SENTINEL-banner-with-shield.png" alt="Sentinel OT" class="access-gate__logo">
    <div class="access-gate__label">Sentinel OT</div>
    <div class="access-gate__heading">Enter your access code to view</div>
    <div class="access-gate__inputs">
      <input type="number" class="access-gate__digit" min="0" max="9" inputmode="numeric" pattern="[0-9]" aria-label="Digit 1">
      <input type="number" class="access-gate__digit" min="0" max="9" inputmode="numeric" pattern="[0-9]" aria-label="Digit 2">
      <input type="number" class="access-gate__digit" min="0" max="9" inputmode="numeric" pattern="[0-9]" aria-label="Digit 3">
      <input type="number" class="access-gate__digit" min="0" max="9" inputmode="numeric" pattern="[0-9]" aria-label="Digit 4">
      <input type="number" class="access-gate__digit" min="0" max="9" inputmode="numeric" pattern="[0-9]" aria-label="Digit 5">
      <input type="number" class="access-gate__digit" min="0" max="9" inputmode="numeric" pattern="[0-9]" aria-label="Digit 6">
    </div>
    <button class="access-gate__btn" id="unlockBtn" disabled>Unlock</button>
    <div class="access-gate__error" id="gateError"></div>
  </div>

  <main id="deck-container"></main>
  <script>
    (function () {
      var SLUG = 'soap-engineering';
      var STORAGE_KEY = 'sentinel_unlock_' + SLUG;
      var TTL = 7 * 24 * 60 * 60 * 1000;
      var ITERS = 100000;

      var gate = document.getElementById('access-gate');
      var mainEl = document.getElementById('deck-container');
      var unlockBtn = document.getElementById('unlockBtn');
      var errorEl = document.getElementById('gateError');
      var digits = Array.from(document.querySelectorAll('.access-gate__digit'));

      function initSlides() {
        var slides = Array.from(document.querySelectorAll('.slide'));
        var current = 0;
        function showSlide(n) {
          slides.forEach(function(s) { s.classList.remove('active'); });
          current = Math.max(0, Math.min(n, slides.length - 1));
          slides[current].classList.add('active');
          var counter = document.getElementById('counter');
          if (counter) counter.textContent = (current + 1) + ' / ' + slides.length;
        }
        window.navigate = function(dir) { showSlide(current + dir); };
        document.addEventListener('keydown', function(e) {
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') window.navigate(1);
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') window.navigate(-1);
        });
        showSlide(0);
      }

      function unlock(html) {
        gate.remove();
        mainEl.innerHTML = html;
        document.body.classList.remove('is-locked');
        mainEl.style.display = 'block';
        initSlides();
      }

      async function deriveKey(code, saltBuf) {
        var enc = new TextEncoder();
        var baseKey = await crypto.subtle.importKey('raw', enc.encode(code), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: saltBuf, iterations: ITERS, hash: 'SHA-256' },
          baseKey,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
      }

      function b64ToBuffer(b64) {
        var bin = atob(b64);
        var buf = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
        return buf.buffer;
      }

      async function tryDecrypt(code) {
        var saltB64 = gate.dataset.salt;
        var ivB64 = gate.dataset.iv;
        var ctB64 = gate.dataset.ciphertext;
        var saltBuf = b64ToBuffer(saltB64);
        var ivBuf = b64ToBuffer(ivB64);
        var ctBuf = b64ToBuffer(ctB64);
        try {
          var key = await deriveKey(code, saltBuf);
          var plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: ivBuf }, key, ctBuf);
          var html = new TextDecoder().decode(plainBuf);
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ code: code, ts: Date.now() })); } catch(e) {}
          unlock(html);
        } catch(e) {
          errorEl.textContent = 'Incorrect code. Please try again.';
          digits.forEach(function(d) { d.value = ''; });
          digits[0].focus();
        }
      }

      digits.forEach(function(input, i) {
        input.addEventListener('input', function() {
          var val = input.value.replace(/[^0-9]/g, '');
          if (val.length > 1) val = val.slice(-1);
          input.value = val;
          errorEl.textContent = '';
          if (val && i < digits.length - 1) digits[i + 1].focus();
          var filled = digits.every(function(d) { return d.value !== ''; });
          unlockBtn.disabled = !filled;
        });
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !input.value && i > 0) {
            digits[i - 1].focus();
            digits[i - 1].value = '';
            unlockBtn.disabled = true;
          }
        });
        input.addEventListener('paste', function(e) {
          e.preventDefault();
          var text = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
          if (text.length === 6) {
            digits.forEach(function(d, j) { d.value = text[j] || ''; });
            unlockBtn.disabled = false;
            digits[5].focus();
          }
        });
      });

      unlockBtn.addEventListener('click', function() {
        var code = digits.map(function(d) { return d.value; }).join('');
        if (code.length === 6) tryDecrypt(code);
      });

      // Auto-unlock from localStorage
      try {
        var stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        if (stored && (Date.now() - stored.ts) < TTL) {
          tryDecrypt(stored.code);
          return;
        }
      } catch(e) {}

      digits[0].focus();
    })();
  </script>
